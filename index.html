<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>michaelzagame.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0f172a;
      color: #f1f5f9;
      font-family: sans-serif;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      justify-content: center;
    }

    a.btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    a.btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .btn-jcpl {
      background: #2563eb;
      color: #fff;
    }

    .btn-youtube {
      background: #dc2626;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>Michael Zagame</h1>
  <div class="buttons">
    <a href="#" class="btn btn-jcpl">JCPL</a>
    <a href="#" class="btn btn-youtube">YouTube</a>
  </div>
</body>
</html>
